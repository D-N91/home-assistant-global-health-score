name: Issue Deduplication

on:
  issues:
    types: [opened]

jobs:
  deduplicate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for duplicate issues
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Check if issue #${{ github.event.issue.number }} in ${{ github.repository }} is a duplicate of an existing issue.

            Steps:
            1. Get the new issue details:
               gh issue view ${{ github.event.issue.number }} --json title,body

            2. Search for similar existing issues using keywords from the title and body:
               gh issue list --state all --search "KEYWORDS" --json number,title,state --limit 20

            3. Compare the new issue with the search results to identify potential duplicates.

            Criteria for duplicates:
            - Same bug or error being reported
            - Same feature request (even if worded differently)
            - Same question being asked
            - Issues describing the same root problem

            If you find a duplicate:
            - Add a comment linking to the original issue:
              gh issue comment ${{ github.event.issue.number }} --body "MESSAGE"
            - Apply the duplicate label:
              bash .github/workflows/scripts/edit-issue-labels.sh --issue ${{ github.event.issue.number }} --add-label duplicate
            - Be polite and suggest the user follow the original issue.

            If it is NOT a duplicate:
            - Do nothing. No comment, no label.

            Be thorough but conservative. Only flag true duplicates, not just similar issues.

          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Bash(gh issue *),Bash(bash .github/workflows/scripts/edit-issue-labels.sh *)"
